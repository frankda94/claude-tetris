<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>

        <div class="panel-section">
          <span class="label">RECORDS</span>
          <ol id="highscore-list"></ol>
          <div class="stat-row">
            <span class="label">Mejor combo</span>
            <span class="value small" id="best-combo">0</span>
          </div>
          <div class="stat-row">
            <span class="label">Más líneas</span>
            <span class="value small" id="max-lines">0</span>
          </div>
          <button id="reset-highscores-btn">Reiniciar récords</button>
        </div>

        <div class="panel-section">
          <label class="theme-toggle">
            <input type="checkbox" id="theme-toggle" />
            <span class="label">MODO CLARO</span>
          </label>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <div id="highscore-input" class="hidden">
          <input type="text" id="player-name" maxlength="8" placeholder="Nombre" />
          <button id="save-score-btn">Guardar</button>
        </div>
        <ol id="overlay-highscores" class="hidden"></ol>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
